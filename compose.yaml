services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "pnpm install --frozen-lockfile && pnpm --filter @witchwatch/api dev"
    environment: &workbench-environment
      CI: "true"
      WITCHWATCH_DB: /var/lib/witchwatch/workbench.sqlite
      WITCHWATCH_LOCAL_ROOTS: /data/inbox
      WITCHWATCH_ALLOWED_HOSTS: cedapug.com
      WITCHWATCH_SEED_EXAMPLE: "true"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8787/health"]
      interval: 3s
      timeout: 2s
      retries: 20
    init: true
    ports:
      - "8787:8787"
    volumes: &workspace-volumes
      - .:/workspace
      - pnpm-store:/pnpm/store
      - root-node-modules:/workspace/node_modules
      - web-node-modules:/workspace/apps/web/node_modules
      - cli-node-modules:/workspace/apps/cli/node_modules
      - api-node-modules:/workspace/apps/api/node_modules
      - worker-node-modules:/workspace/apps/worker/node_modules
      - acquisition-node-modules:/workspace/packages/acquisition/node_modules
      - contracts-node-modules:/workspace/packages/contracts/node_modules
      - demo-source1-node-modules:/workspace/packages/demo-source1/node_modules
      - detectors-node-modules:/workspace/packages/detectors/node_modules
      - geometry-node-modules:/workspace/packages/geometry/node_modules
      - l4d2-schema-node-modules:/workspace/packages/l4d2-schema/node_modules
      - scoring-node-modules:/workspace/packages/scoring/node_modules
      - storage-node-modules:/workspace/packages/storage/node_modules
      - workbench-data:/var/lib/witchwatch
      - ./data/sprint-1-corpus/extracted:/data/inbox:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "pnpm --filter @witchwatch/worker dev"
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *workbench-environment
      WITCHWATCH_PSEUDONYM_KEY: ${WITCHWATCH_PSEUDONYM_KEY:-witchwatch-dev-only-local-key-v1}
    init: true
    volumes: *workspace-volumes

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "pnpm install --frozen-lockfile && pnpm dev:container"
    depends_on:
      api:
        condition: service_healthy
    environment:
      CI: "true"
      CHOKIDAR_USEPOLLING: "true"
      WITCHWATCH_API_URL: http://api:8787
    init: true
    ports:
      - "5173:5173"
    volumes: *workspace-volumes

  reference:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      - ./scripts/run-untitled-parser-check.sh
      - data/sprint-1-corpus/extracted
    environment:
      CI: "true"
    init: true
    volumes: *workspace-volumes

volumes:
  pnpm-store:
  root-node-modules:
  web-node-modules:
  cli-node-modules:
  acquisition-node-modules:
  contracts-node-modules:
  demo-source1-node-modules:
  detectors-node-modules:
  geometry-node-modules:
  l4d2-schema-node-modules:
  scoring-node-modules:
  api-node-modules:
  worker-node-modules:
  storage-node-modules:
  workbench-data:
