services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "pnpm install --frozen-lockfile && pnpm --filter @l4dstats/api dev"
    environment: &workbench-environment
      CI: "true"
      TURBO_TELEMETRY_DISABLED: "1"
      L4DSTATS_DB: /var/lib/l4dstats/workbench.sqlite
      L4DSTATS_UPLOAD_ROOT: /var/lib/l4dstats/uploads
      L4DSTATS_GEOMETRY_ROOT: /var/lib/l4dstats/geometry
      L4DSTATS_GEOMETRY_ROOTS: /var/lib/l4dstats/geometry:/workspace/map-geometry
      L4DSTATS_LOCAL_ROOTS: /data/inbox
      L4DSTATS_ALLOWED_HOSTS: cedapug.com
      L4DSTATS_API_TOKEN: ${L4DSTATS_API_TOKEN:-l4dstats-dev-api-token-change-before-sharing}
      L4DSTATS_AUTH_FAILURE_LIMIT: "20"
      L4DSTATS_AUTH_FAILURE_WINDOW_MS: "300000"
      L4DSTATS_MUTATION_RATE_LIMIT: "120"
      L4DSTATS_MUTATION_RATE_WINDOW_MS: "60000"
      L4DSTATS_SEED_EXAMPLE: "false"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8787/health"]
      interval: 3s
      timeout: 2s
      retries: 20
    init: true
    ports:
      - "0.0.0.0:8787:8787"
    volumes: &workspace-volumes
      - .:/workspace
      - pnpm-store:/pnpm/store
      - root-node-modules:/workspace/node_modules
      - web-node-modules:/workspace/apps/web/node_modules
      - cli-node-modules:/workspace/apps/cli/node_modules
      - api-node-modules:/workspace/apps/api/node_modules
      - worker-node-modules:/workspace/apps/worker/node_modules
      - acquisition-node-modules:/workspace/packages/acquisition/node_modules
      - contracts-node-modules:/workspace/packages/contracts/node_modules
      - detectors-node-modules:/workspace/packages/detectors/node_modules
      - geometry-node-modules:/workspace/packages/geometry/node_modules
      - map-source1-node-modules:/workspace/packages/map-source1/node_modules
      - scoring-node-modules:/workspace/packages/scoring/node_modules
      - storage-node-modules:/workspace/packages/storage/node_modules
      - workbench-data:/var/lib/l4dstats
      - l4d2-server-assets:/opt/l4d2
      - ./data/sprint-1-corpus/extracted:/data/inbox:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "pnpm native:prepare && pnpm --filter @l4dstats/worker dev"
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *workbench-environment
      L4DSTATS_PSEUDONYM_KEY: ${L4DSTATS_PSEUDONYM_KEY:-l4dstats-dev-only-local-key-v1}
    init: true
    volumes: *workspace-volumes

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "pnpm install --frozen-lockfile && pnpm dev:container"
    depends_on:
      api:
        condition: service_healthy
        restart: true
    environment:
      CI: "true"
      TURBO_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      L4DSTATS_API_URL: http://api:8787
      L4DSTATS_API_TOKEN: ${L4DSTATS_API_TOKEN:-l4dstats-dev-api-token-change-before-sharing}
      L4DSTATS_WEB_USERNAME: ${L4DSTATS_WEB_USERNAME:-}
      L4DSTATS_WEB_PASSWORD: ${L4DSTATS_WEB_PASSWORD:-}
    init: true
    ports:
      - "0.0.0.0:5173:5173"
    volumes: *workspace-volumes

  reference:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      - ./scripts/run-untitled-parser-check.sh
      - data/sprint-1-corpus/extracted
    environment:
      CI: "true"
    init: true
    volumes: *workspace-volumes

  maps-install:
    profiles: ["maps"]
    image: steamcmd/steamcmd@sha256:5a8173f2e8d3e871a01509096e492f639e428879719eb7b33c219478d9c30f3e
    platform: linux/amd64
    command:
      [
        "+force_install_dir",
        "/opt/l4d2",
        "+login",
        "anonymous",
        "+app_update",
        "222860",
        "validate",
        "+quit",
      ]
    volumes:
      - l4d2-server-assets:/opt/l4d2

  maps-extract:
    profiles: ["maps"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      [
        "bash",
        "-lc",
        'pnpm install --frozen-lockfile && manifest=/opt/l4d2/steamapps/appmanifest_222860.acf; args=(/opt/l4d2 /var/lib/l4dstats/geometry); [[ ! -f "$$manifest" ]] || args+=("$$manifest"); pnpm --filter @l4dstats/map-source1 extract-installation "$${args[@]}"',
      ]
    environment:
      CI: "true"
    volumes: *workspace-volumes

volumes:
  pnpm-store:
  root-node-modules:
  web-node-modules:
  cli-node-modules:
  acquisition-node-modules:
  contracts-node-modules:
  detectors-node-modules:
  geometry-node-modules:
  map-source1-node-modules:
  scoring-node-modules:
  api-node-modules:
  worker-node-modules:
  storage-node-modules:
  workbench-data:
  l4d2-server-assets:
