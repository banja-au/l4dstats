services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "pnpm install --frozen-lockfile && pnpm dev:container"
    environment:
      CI: "true"
      CHOKIDAR_USEPOLLING: "true"
    init: true
    ports:
      - "5173:5173"
    volumes: &workspace-volumes
      - .:/workspace
      - pnpm-store:/pnpm/store
      - root-node-modules:/workspace/node_modules
      - web-node-modules:/workspace/apps/web/node_modules
      - cli-node-modules:/workspace/apps/cli/node_modules
      - acquisition-node-modules:/workspace/packages/acquisition/node_modules
      - contracts-node-modules:/workspace/packages/contracts/node_modules
      - demo-source1-node-modules:/workspace/packages/demo-source1/node_modules
      - detectors-node-modules:/workspace/packages/detectors/node_modules
      - geometry-node-modules:/workspace/packages/geometry/node_modules
      - l4d2-schema-node-modules:/workspace/packages/l4d2-schema/node_modules

  reference:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      - ./scripts/run-untitled-parser-check.sh
      - data/sprint-1-corpus/extracted
    environment:
      CI: "true"
    init: true
    volumes: *workspace-volumes

volumes:
  pnpm-store:
  root-node-modules:
  web-node-modules:
  cli-node-modules:
  acquisition-node-modules:
  contracts-node-modules:
  demo-source1-node-modules:
  detectors-node-modules:
  geometry-node-modules:
  l4d2-schema-node-modules:
