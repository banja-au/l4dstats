name: Verify and deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
      - name: Install pinned dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify formatting
        run: pnpm format:check
      - name: Verify types and Rust lints
        run: pnpm check
      - name: Run tests
        run: pnpm test
      - name: Build production artifacts
        run: pnpm build

  infrastructure:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_R2_SECRET_ACCESS_KEY }}
      TF_IN_AUTOMATION: "true"
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5
      - name: Initialize remote Terraform state
        run: |
          test -n "${{ secrets.TF_STATE_R2_BUCKET }}"
          terraform -chdir=infra/terraform/cloudflare init \
            -backend-config="bucket=${{ secrets.TF_STATE_R2_BUCKET }}" \
            -backend-config="key=production/cloudflare.tfstate" \
            -backend-config="region=auto" \
            -backend-config="endpoint=https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="use_path_style=true"
      - name: Validate and apply Cloudflare infrastructure
        run: |
          terraform -chdir=infra/terraform/cloudflare fmt -check -diff
          terraform -chdir=infra/terraform/cloudflare validate
          terraform -chdir=infra/terraform/cloudflare plan -out=production.tfplan -var="environment=production"
          terraform -chdir=infra/terraform/cloudflare apply -auto-approve production.tfplan

  deploy:
    needs: [verify, infrastructure]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PRODUCTION_HOSTNAME: ${{ vars.PRODUCTION_HOSTNAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install pinned dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web and hosted dispatcher
        run: pnpm turbo run build --filter=@l4dstats/web --filter=@l4dstats/edge
      - name: Validate deployment configuration
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$PRODUCTION_HOSTNAME"
          deploy/cloudflare/render-config.sh production apps/edge/src/entrypoint.ts "$PRODUCTION_HOSTNAME"
      - name: Publish runtime secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          L4DSTATS_PSEUDONYM_KEY: ${{ secrets.L4DSTATS_PSEUDONYM_KEY }}
        run: |
          test -n "$TURSO_DATABASE_URL"
          test -n "$TURSO_AUTH_TOKEN"
          test -n "$L4DSTATS_PSEUDONYM_KEY"
          printf '%s' "$TURSO_DATABASE_URL" | pnpm dlx wrangler@4 secret put TURSO_DATABASE_URL --config deploy/cloudflare/wrangler.production.jsonc
          printf '%s' "$TURSO_AUTH_TOKEN" | pnpm dlx wrangler@4 secret put TURSO_AUTH_TOKEN --config deploy/cloudflare/wrangler.production.jsonc
          printf '%s' "$L4DSTATS_PSEUDONYM_KEY" | pnpm dlx wrangler@4 secret put L4DSTATS_PSEUDONYM_KEY --config deploy/cloudflare/wrangler.production.jsonc
      - name: Deploy Worker, static assets, Queue bindings, and Container
        run: pnpm dlx wrangler@4 deploy --config deploy/cloudflare/wrangler.production.jsonc
      - name: Attach production hostname
        run: |
          response="$(curl --fail-with-body --silent --show-error \
            --request PUT \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"hostname\":\"$PRODUCTION_HOSTNAME\",\"service\":\"l4dstats-production\",\"zone_name\":\"$PRODUCTION_HOSTNAME\"}" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/domains")"
          RESPONSE="$response" node -e '
            const body = JSON.parse(process.env.RESPONSE);
            if (!body.success) {
              console.error(body.errors?.map(({ code, message }) => `${code}: ${message}`).join("\n"));
              process.exit(1);
            }
            console.log(`Attached ${body.result.hostname} to ${body.result.service}`);
          '
